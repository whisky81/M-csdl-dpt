<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Search System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .upload-form {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="file"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .combo-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .combo-selector button {
            background-color: #6c757d;
        }

        .combo-selector button.active {
            background-color: #28a745;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        audio {
            width: 250px;
        }

        .metrics {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            display: none;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Voice Similarity Search</h1>
        <form id="uploadForm" class="upload-form" enctype="multipart/form-data">
            <div class="form-group">
                <input type="file" name="file" id="fileInput" accept="audio/*" required>
                <div id="audioPreview" style="margin-top: 10px; display: none;">
                    <audio controls id="previewAudio"></audio>
                </div>
            </div>
            <button type="submit">Search</button>
        </form>

        <div class="loading" id="loading">Processing... Please wait.</div>
        <div id="error" class="error"></div>

        <div id="comboButtons" class="combo-selector"></div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        const comboMapping = {
            "min-max | euclidean | ivfflat": 0,
            "min-max | cosine    | ivfflat": 1,
            "z-score | euclidean | ivfflat": 2,
            "z-score | cosine    | ivfflat": 3,
            "min-max | euclidean | kd-tree": 4,
            "z-score | euclidean | kd-tree": 5
        };
        let allData = null;
        let activeCombo = null;

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert('Please select a file');
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').innerText = '';
            document.getElementById('comboButtons').innerHTML = '';
            document.getElementById('resultsContainer').innerHTML = '';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.error) {
                    throw new Error(data.error);
                }
                allData = data;
                renderComboButtons();
                // Mặc định chọn tổ hợp tốt nhất (ưu tiên precision > recall)
                const best = selectBestCombo();
                if (best) {
                    setActiveCombo(best);
                } else {
                    // Nếu không có, chọn tổ hợp đầu tiên
                    const first = Object.keys(allData)[0];
                    if (first) setActiveCombo(first);
                }
            } catch (err) {
                document.getElementById('error').innerText = err.message;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        function selectBestCombo() {
            let best = null;
            let bestPrec = -1;
            let bestRecall = -1;
            // Duyệt theo thứ tự ưu tiên đã định sẵn
            for (const combo of Object.keys(allData)) {
                const prec = allData[combo].precision;
                const rec = allData[combo].recall;
                if (prec === null) continue; // không có speaker -> bỏ qua
                if (prec > bestPrec || (prec === bestPrec && rec > bestRecall)) {
                    bestPrec = prec;
                    bestRecall = rec;
                    best = combo;
                }
            }
            // Nếu không có tổ hợp nào có precision, chọn tổ hợp đầu tiên
            if (best === null && Object.keys(allData).length) {
                best = Object.keys(allData)[0];
            }
            return best;
        }

        function renderComboButtons() {
            const container = document.getElementById('comboButtons');
            container.innerHTML = '';
            for (const combo of Object.keys(allData)) {
                const btn = document.createElement('button');
                btn.textContent = combo;
                btn.onclick = () => setActiveCombo(combo);
                container.appendChild(btn);
            }
        }

        function setActiveCombo(combo) {
            activeCombo = combo;
            // Đánh dấu nút active
            const buttons = document.querySelectorAll('.combo-selector button');
            buttons.forEach(btn => {
                if (btn.textContent === combo) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderResults(combo);
        }

        function renderResults(combo) {
            const data = allData[combo];
            if (!data) return;

            const metrics = `Precision@5: ${data.precision !== null ? data.precision.toFixed(4) : 'N/A'} | Recall@5: ${data.recall !== null ? data.recall.toFixed(4) : 'N/A'}`;

            let html = `<div class="metrics">${metrics}</div>`;
            html += `<table>`;
            html += `<tr><th>#</th><th>ID</th><th>Speaker</th><th>Distance</th><th>Audio</th></tr>`;
            data.results.forEach((res, idx) => {
                html += `<tr>
                            <td>${idx + 1}</td>
                            <td>${res.obj_id}</td>
                            <td>${res.speaker || 'unknown'}</td>
                            <td>${res.distance.toFixed(6)}</td>
                            <td>${res.file_url ? `<audio controls src="${res.file_url}"></audio>` : 'No file'}</td>
                         </tr>`;
            });
            html += `</table>`;

            const container = document.getElementById('resultsContainer');
            container.innerHTML = html;
        }

        // Chức năng preview audio khi chọn file
        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const previewDiv = document.getElementById('audioPreview');
            const audio = document.getElementById('previewAudio');
            if (file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                previewDiv.style.display = 'block';
                // Giải phóng URL sau khi audio kết thúc
                audio.onended = () => URL.revokeObjectURL(url);
            } else {
                previewDiv.style.display = 'none';
                audio.src = '';
            }
        });
    </script>
</body>

</html>
